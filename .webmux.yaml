name: Webmux

workspace:
  mainBranch: main
  worktreeRoot: ../workmux-web__worktrees
  defaultAgent: claude

auto_name:
  provider: claude
  model: haiku

startupEnvs:
  NODE_ENV: development

lifecycleHooks:
  postCreate: ./scripts/post-create.sh
  preRemove: ./scripts/pre-remove.sh

services:
  - name: BE
    portEnv: PORT
    portStart: 5111
    portStep: 10
  - name: FE
    portEnv: FRONTEND_PORT
    portStart: 5112
    portStep: 10

profiles:
  slim:
    runtime: host
    envPassthrough: []
    panes:
      - id: agent
        kind: agent
        focus: true
    yolo: true
  full:
    runtime: host
    envPassthrough: []
    panes:
      - id: agent
        kind: agent
        focus: true
      - id: backend
        kind: command
        split: right
        command: cd backend && bun install && bun run dev
      - id: frontend
        kind: command
        split: bottom
        command: cd frontend && bun install && bun run dev
    systemPrompt: >
      You are working inside a project managed by webmux.
      Backend port: ${PORT}. Frontend port: ${FRONTEND_PORT}.
      Start the backend with: source "$(git rev-parse --git-dir)/webmux/runtime.env" && cd backend && bun run dev
      Start the frontend with: source "$(git rev-parse --git-dir)/webmux/runtime.env" && cd frontend && bun run dev
    yolo: true
  sandbox:
    runtime: docker
    image: workmux-sandbox
    envPassthrough:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - R2_ENDPOINT
      - R2_BUCKET
      - R2_PUBLIC_URL
    panes:
      - id: agent
        kind: agent
        focus: true
      - id: backend
        kind: command
        split: bottom
        command: cd backend && bun run dev
      - id: frontend
        kind: command
        split: bottom
        command: cd frontend && bun run dev
    systemPrompt: >
      You are running inside a sandboxed container with full permissions.
      IMPORTANT: Read docs/autonomous-mode.md before starting any work.
      Worktree runtime env lives at:
      $(git rev-parse --git-dir)/webmux/runtime.env
      Load it with:
      source "$(git rev-parse --git-dir)/webmux/runtime.env"
      This worktree is configured with the following ports:

      - Backend: port ${PORT}.
        Start with: source "$(git rev-parse --git-dir)/webmux/runtime.env" && cd backend && bun run dev

      - Frontend: port ${FRONTEND_PORT}.
        Start with: source "$(git rev-parse --git-dir)/webmux/runtime.env" && cd frontend && bun run dev

      --- Screenshots ---
      You can take screenshots of the frontend UI and upload them to R2
      for use in PR descriptions.
      1) Take a screenshot:
         bunx playwright screenshot --browser chromium
         http://localhost:${FRONTEND_PORT}/path/to/page /tmp/screenshot.png
      2) Upload to R2:
         aws s3 cp /tmp/screenshot.png
         "s3://$(printenv R2_BUCKET)/$(git rev-parse --abbrev-ref HEAD)/screenshot.png"
         --endpoint-url "$(printenv R2_ENDPOINT)"
      3) The public URL will be:
         $(printenv R2_PUBLIC_URL)/<branch>/screenshot.png
      4) Include screenshots in PR descriptions as markdown images:
         ![description]($(printenv R2_PUBLIC_URL)/<branch>/screenshot.png)

      --- Terminal Recordings (asciinema) ---
      You can record terminal sessions and upload them for sharing.
      asciinema is pre-installed at /root/.cargo/bin/asciinema.

      1) Write a shell script with the commands to demo. Add sleep
          delays for readable pacing:
          - 0.5s after printing a "$ command" line (lets viewer read it)
          - 1.5-2s after command output (lets viewer absorb the result)
          - Set GIT_PAGER=cat and PAGER=cat to prevent pager hangs

      2) Record headlessly:
          asciinema rec --headless --overwrite \
            -c "bash /tmp/demo.sh" \
            --window-size 120x50 \
            --title "Description of demo" \
            /tmp/demo.cast

      3) Upload to asciinema.org:
          XDG_DATA_HOME=/tmp/.local/share \
            asciinema upload --server-url https://asciinema.org /tmp/demo.cast

      --- Mermaid Diagrams ---
      You can render Mermaid diagrams to SVG using the pre-installed mmdc CLI.
      The puppeteer config (no-sandbox + Chromium path) is at /root/.puppeteerrc.json.

      1) Write a .mmd file with your diagram:
          cat > /tmp/diagram.mmd << 'EOF'
          graph TD
            A[Start] --> B[End]
          EOF

      2) Render to SVG (the -p flag is required):
          mmdc -i /tmp/diagram.mmd -o /tmp/diagram.svg -p /root/.puppeteerrc.json

      3) Upload to R2:
          aws s3 cp /tmp/diagram.svg
          "s3://$(printenv R2_BUCKET)/$(git rev-parse --abbrev-ref HEAD)/diagram.svg"
          --endpoint-url "$(printenv R2_ENDPOINT)"

      4) The public URL will be:
          $(printenv R2_PUBLIC_URL)/<branch>/diagram.svg

      5) Include in PR descriptions as markdown images:
          ![description]($(printenv R2_PUBLIC_URL)/<branch>/diagram.svg)

integrations:
  linear:
    enabled: true
