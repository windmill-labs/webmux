main_branch: main

merge_strategy: rebase
# worktree_dir: .worktrees

worktree_naming: basename

worktree_prefix: ""

# Default: "wm-"
window_prefix: "wm-"

auto_name:
  model: "gemini-2.5-flash-lite"
  system_prompt: |
    Generate a concise git branch name based on the task description.

    Rules:
    - Use kebab-case (lowercase with hyphens)
    - Keep it short: 1-3 words, max 4 if necessary
    - Focus on the core task/feature, not implementation details
    - No prefixes like feat/, fix/, chore/

    Examples of good branch names:
    - "Add dark mode toggle" → dark-mode
    - "Fix the search results not showing" → fix-search
    - "Refactor the authentication module" → auth-refactor
    - "Add CSV export to reports" → export-csv
    - "Shell completion is broken" → shell-completion

    Output ONLY the branch name, nothing else.
  background: true

panes:
  - command: >-
      claude --dangerously-skip-permissions --append-system-prompt
      "You are running inside a git worktree managed by workmux.\n
      Pane layout (current window):\n
      - Pane 0: this pane (claude agent)\n
      - Pane 1: backend (bun run dev)\n
      - Pane 2: frontend (bun run dev)\n\n
      To check logs: tmux capture-pane -t .1 -p -S -50 (backend), tmux capture-pane -t .2 -p -S -50 (frontend).\n
      The backend on the main worktree runs on the default port (5111).\n
      Ports are in .env.local: BACKEND_PORT (backend), FRONTEND_PORT (frontend).\n\n
      To create a worktree for a parallel subtask:\n
      workmux add -b -p PROMPT BRANCH\n
      Supply an explicit BRANCH name (kebab-case, 1-3 words, describe the change).\n
      Create one at a time — run the command, wait for completion, then create the next.\n\n
      IMPORTANT: Read docs/autonomous-mode.md before starting any work."
    focus: true
  - command: 'ROOT="$(git rev-parse --show-toplevel)"; [ -f "$ROOT/.env.local" ] && source "$ROOT/.env.local"; cd "$ROOT/backend" && bun install && bun run dev'
    split: horizontal
  - command: 'ROOT="$(git rev-parse --show-toplevel)"; [ -f "$ROOT/.env.local" ] && source "$ROOT/.env.local"; cd "$ROOT/frontend" && bun install && bun run dev'
    split: horizontal

sandbox:
  enabled: false
  toolchain: off
